services:
  backend:
    build:
      context: .
      target: development
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always
    logging:
      driver: 'json-file'
      options:
        max-size: '200k'
        max-file: '10'
    volumes:
      - .:/code/:cached
      - node_modules:/code/node_modules
    ports:
      - ${PUBLIC_PORT}:${PORT}
    environment:
      APP_ID: ${APP_ID}
      APP_NAME: ${APP_NAME}
      JIBBER_SECRET_PASSWORD_TOKEN: ${JIBBER_SECRET_PASSWORD_TOKEN}
      #CLOUD_CODE_MAIN: ${CLOUD_CODE_MAIN}
      CLOUD_CODE_MAIN: ${CLOUD_CODE_MAIN:-src/cloud}
      DATABASE_URI: ${DATABASE_URI:-mongodb://mongodb:27017/jibber}
      MASTER_KEY: ${MASTER_KEY}
      PARSE_MOUNT: ${PARSE_MOUNT}
      PORT: ${PORT}
      PUBLIC_SERVER_URL: ${PUBLIC_SERVER_URL}
      SERVER_URL: ${SERVER_URL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_API_KEY: ${TWILIO_API_KEY}
      TWILIO_API_SECRET: ${TWILIO_API_SECRET}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_SERVICE_SID: ${TWILIO_SERVICE_SID}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID}
      TWILIO_MESSAGING_SERVICE_SID: ${TWILIO_MESSAGING_SERVICE_SID}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      IOS_APN_KEY: ${IOS_APN_KEY}
      IOS_BUNDLE_ID: ${IOS_BUNDLE_ID}
      IOS_KEY_ID: ${IOS_KEY_ID}
      IOS_PUSH_PRODUCTION: ${IOS_PUSH_PRODUCTION:-false}
      IOS_TEAM_ID: ${IOS_TEAM_ID}
      REDIS_URL: ${REDIS_URL}
      TEST_USER_PHONE_NUMBER: ${TEST_USER_PHONE_NUMBER}
      TEST_USER_VERIFICATION_CODE: ${TEST_USER_VERIFICATION_CODE}
  mongodb:
    image: mongo:7.0
    restart: always
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - mongodb_data:/data/db
  dashboard:
    image: parseplatform/parse-dashboard
    logging:
      driver: 'json-file'
      options:
        max-size: '200k'
        max-file: '10'
    ports:
      - ${DASHBOARD_PUBLIC_PORT}:4040
    environment:
      HOST: '0.0.0.0'
      PORT: 4040
      MOUNT_PATH: '/'
      # PARSE_DASHBOARD_TRUST_PROXY: undefined // Or "1" to trust connection info from a proxy's X-Forwarded-* headers
      PARSE_DASHBOARD_SERVER_URL: ${SERVER_URL}
      PARSE_DASHBOARD_MASTER_KEY: ${MASTER_KEY}
      PARSE_DASHBOARD_APP_ID: ${APP_ID}
      PARSE_DASHBOARD_APP_NAME: ${APP_NAME}
      PARSE_DASHBOARD_USER_ID: 'admin'
      PARSE_DASHBOARD_USER_PASSWORD: 'admin'
      PARSE_DASHBOARD_ALLOW_INSECURE_HTTP: 1
      # PARSE_DASHBOARD_SSL_KEY: "sslKey"
      # PARSE_DASHBOARD_SSL_CERT: "sslCert"
      # PARSE_DASHBOARD_COOKIE_SESSION_SECRET:

volumes:
  mongodb_data:
  node_modules:
